<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oahu Sensor Deployment Map — Hohonu</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }

header { background: #160033; padding: 11px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #7611FF; flex-shrink: 0; }
header h1 { color: #F6F2F8; font-size: 15px; font-weight: 700; }
header .sub { color: #FF725D; font-size: 11px; font-weight: 600; }

.layout { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; }

.sidebar { width: 295px; background: #fff; border-left: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

.stats { background: #160033; padding: 10px 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; flex-shrink: 0; }
.stat { text-align: center; }
.stat-n { color: #FF725D; font-size: 18px; font-weight: 700; line-height: 1; }
.stat-l { color: #F6F2F8; font-size: 8px; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

.ctrl-panel { padding: 10px 14px; border-bottom: 1px solid #eee; flex-shrink: 0; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #888; width: 58px; flex-shrink: 0; }

.bm-btns { display: flex; gap: 5px; flex: 1; }
.bm-btn { flex: 1; padding: 5px 6px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1.5px solid #ddd; border-radius: 5px; background: #f5f5f5; color: #666; font-family: 'Montserrat', sans-serif; transition: all 0.15s; }
.bm-btn.active { background: #160033; color: #fff; border-color: #7611FF; }

.layer-checks { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.layer-row { display: flex; align-items: center; gap: 7px; cursor: pointer; }
.layer-row input { cursor: pointer; accent-color: #7611FF; width: 13px; height: 13px; }
.layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.layer-lbl { font-size: 11px; color: #333; flex: 1; }
.layer-ct { font-size: 10px; font-weight: 700; color: #aaa; }

.add-section { padding: 10px 14px; border-bottom: 1px solid #eee; flex-shrink: 0; }
.add-btn { width: 100%; padding: 8px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid #E65100; border-radius: 7px; background: #fff; color: #E65100; transition: all 0.15s; }
.add-btn.active { background: #E65100; color: #fff; }
.add-hint { font-size: 10px; color: #E65100; margin-top: 5px; display: none; text-align: center; }
.add-hint.show { display: block; }

.filter-tabs { display: flex; border-bottom: 2px solid #eee; flex-shrink: 0; }
.tab { flex: 1; padding: 8px 4px; font-size: 10px; font-weight: 700; text-align: center; cursor: pointer; color: #aaa; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.3px; }
.tab.active { color: #160033; border-bottom-color: #7611FF; }

.site-list { flex: 1; overflow-y: auto; }

.site-item { padding: 8px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.12s; }
.site-item:hover { background: #f5f0ff; }
.site-top { display: flex; align-items: flex-start; gap: 8px; }
.site-dot-wrap { padding-top: 3px; flex-shrink: 0; }
.site-info { flex: 1; min-width: 0; }
.site-name { font-size: 11px; font-weight: 700; color: #160033; line-height: 1.3; }
.site-id { font-size: 9px; color: #aaa; margin-top: 1px; }
.site-loc { font-size: 10px; color: #777; margin-top: 1px; }
.site-coords { font-size: 9px; color: #bbb; margin-top: 2px; font-style: italic; }
.site-last { font-size: 9px; font-weight: 700; color: #1565C0; margin-top: 2px; }

/* Reactivation toggle */
.reactiv-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; padding-top: 5px; border-top: 1px solid #f0f0f0; }
.reactiv-label { font-size: 10px; color: #888; }
.reactiv-label.on { color: #E65100; font-weight: 700; }
.toggle-sw { position: relative; display: inline-block; width: 34px; height: 17px; }
.toggle-sw input { opacity: 0; width: 0; height: 0; }
.toggle-sl { position: absolute; cursor: pointer; inset: 0; background: #ddd; border-radius: 17px; transition: .2s; }
.toggle-sl::before { content: ''; position: absolute; height: 13px; width: 13px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: .2s; }
.toggle-sw input:checked + .toggle-sl { background: #E65100; }
.toggle-sw input:checked + .toggle-sl::before { transform: translateX(17px); }

/* Proposed pin actions */
.pin-actions { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.pin-edit-btn { font-size: 10px; color: #7611FF; cursor: pointer; background: none; border: none; font-family: 'Montserrat', sans-serif; padding: 0; }
.pin-del-btn  { font-size: 10px; color: #e53935; cursor: pointer; background: none; border: none; font-family: 'Montserrat', sans-serif; padding: 0; margin-left: auto; }
.pin-edit-input { width: 100%; padding: 3px 6px; border: 1px solid #7611FF; border-radius: 4px; font-family: 'Montserrat', sans-serif; font-size: 11px; margin-top: 3px; }

.empty-msg { font-size: 11px; color: #bbb; text-align: center; padding: 24px 14px; line-height: 1.6; }

.export-row { padding: 8px 14px; border-top: 1px solid #eee; flex-shrink: 0; display: block; }
.export-btn { width: 100%; padding: 7px; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: #f5f5f5; color: #555; }

/* Popup */
.leaflet-popup-content-wrapper { border-radius: 8px; font-family: 'Montserrat', sans-serif; }
.leaflet-popup-content { margin: 12px 14px; min-width: 190px; }
.pop-badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px; color: #fff; margin-bottom: 6px; }
.pop-title { font-weight: 700; font-size: 13px; color: #160033; margin-bottom: 4px; line-height: 1.3; }
.pop-row { font-size: 11px; color: #444; margin-bottom: 3px; }
.pop-row b { color: #160033; }
.pop-coords { font-size: 10px; color: #aaa; margin-top: 5px; font-style: italic; }
</style>
</head>

<header>
  <h1>Oahu Sensor Deployment Map</h1>
  <span class="sub">Hohonu</span>
</header>

<div class="layout">
  <div id="map"></div>

  <div class="sidebar">
    <div class="stats">
      <div class="stat"><div class="stat-n">38</div><div class="stat-l">Active USGS</div></div>
      <div class="stat"><div class="stat-n">48</div><div class="stat-l">Inactive / Decomm.</div></div>
      <div class="stat"><div class="stat-n" id="s-new">0</div><div class="stat-l">Proposed New</div></div>
    </div>

    <div class="ctrl-panel">
      <div class="ctrl-row">
        <span class="ctrl-label">Basemap</span>
        <div class="bm-btns">
          <button id="btn-streets" class="bm-btn active" onclick="setBasemap('streets')">Streets</button>
          <button id="btn-topo" class="bm-btn" onclick="setBasemap('topo')">Topo</button>
          <button id="btn-satellite" class="bm-btn" onclick="setBasemap('satellite')">Satellite</button>
        </div>
      </div>
      <div class="ctrl-row" style="align-items:flex-start">
        <span class="ctrl-label" style="padding-top:2px">Layers</span>
        <div class="layer-checks">
          <label class="layer-row"><input type="checkbox" checked onchange="toggleLayer('active',this.checked)"><div class="layer-dot" style="background:#2E7D32"></div><span class="layer-lbl">Active USGS</span><span class="layer-ct">38</span></label>
          <label class="layer-row"><input type="checkbox" checked onchange="toggleLayer('inactive',this.checked)"><div class="layer-dot" style="background:#1565C0"></div><span class="layer-lbl">Inactive / Decommissioned</span><span class="layer-ct">48</span></label>
          <label class="layer-row"><input type="checkbox" checked onchange="toggleLayer('proposed',this.checked)"><div class="layer-dot" style="background:#E65100"></div><span class="layer-lbl">Proposed New Deployments</span><span class="layer-ct" id="lct-new">0</span></label>
        </div>
      </div>
    </div>

    <div class="add-section">
      <button class="add-btn" id="addBtn" onclick="toggleAddMode()">＋ Add Proposed Deployment</button>
      <div class="add-hint" id="addHint">Click on a stream to place a pin</div>
    </div>

    <div class="filter-tabs">
      <div class="tab active" onclick="setTab('active')"   id="tab-active">Active</div>
      <div class="tab"        onclick="setTab('inactive')" id="tab-inactive">Inactive</div>
      <div class="tab"        onclick="setTab('proposed')" id="tab-proposed">Proposed</div>
    </div>

    <div class="site-list" id="siteList"></div>
    <div class="export-row" id="exportRow">
      <button class="export-btn" onclick="exportJSON()" style="margin-bottom:5px">⬇ Save pins (JSON)</button>
      <button class="export-btn" onclick="document.getElementById('importFile').click()">⬆ Load pins (JSON)</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
      <button class="export-btn" onclick="exportCSV()" style="margin-top:5px;color:#888">⬇ Export CSV</button>
    </div>
  </div>
</div>

const map = L.map('map', { center: [21.47, -157.97], zoom: 10 });

// Basemaps
const baseLayers = {
  streets: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }),
  topo: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri, HERE, Garmin', maxZoom: 19
  }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri, Maxar', maxZoom: 19
  })
};
baseLayers.streets.addTo(map);

let currentBase = 'streets';
function setBasemap(name) {
  if (name === currentBase) return;
  map.removeLayer(baseLayers[currentBase]);
  baseLayers[name].addTo(map);
  currentBase = name;
  document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  [layers.active, layers.inactive, layers.proposed].forEach(l => map.hasLayer(l) && l.bringToFront());
}

// ── Icons ─────────────────────────────────────────────────────────────────────
function dotSVG(fill, r=7) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${r*2+3}" height="${r*2+3}">
    <circle cx="${r+1.5}" cy="${r+1.5}" r="${r}" fill="${fill}" stroke="white" stroke-width="1.5"/>
  </svg>`;
}
function splitSVG(r=7) {
  const d = r*2+3, c = r+1.5;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${d}" height="${d}">
    <circle cx="${c}" cy="${c}" r="${r}" fill="#1565C0" stroke="white" stroke-width="1.5"/>
    <path d="M${c} ${c-r} A${r} ${r} 0 0 1 ${c} ${c+r} Z" fill="#E65100"/>
  </svg>`;
}

function makeIcon(svgStr, r=7) {
  const s = r*2+3;
  return L.divIcon({ html: svgStr, className: '', iconSize: [s,s], iconAnchor: [s/2,s/2], popupAnchor: [0,-s/2] });
}

// ── Layers ────────────────────────────────────────────────────────────────────
const layers = { active: L.layerGroup(), inactive: L.layerGroup(), proposed: L.layerGroup() };

function popupHTML(badge, badgeColor, d) {
  let h = `<span class="pop-badge" style="background:${badgeColor}">${badge}</span>`;
  h += `<div class="pop-title">${d.name}</div>`;
  if (d.loc)  h += `<div class="pop-row"><b>Location:</b> ${d.loc}</div>`;
  if (d.id)   h += `<div class="pop-row"><b>USGS ID:</b> ${d.id}</div>`;
  if (d.last) h += `<div class="pop-row"><b>Last Active:</b> ${d.last}</div>`;
  h += `<div class="pop-coords">${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</div>`;
  return h;
}

// Active markers
const activeMarkers = ACTIVE.map(d => {
  const m = L.marker([d.lat, d.lon], { icon: makeIcon(dotSVG('#2E7D32')) })
    .bindPopup(popupHTML('Active USGS','#2E7D32',d));
  m.addTo(layers.active);
  return { ...d, marker: m };
});

// Inactive markers — use divIcon so we can swap to split icon
const reactivateSet = new Set();
const inactiveMarkers = INACTIVE.map(d => {
  const m = L.marker([d.lat, d.lon], { icon: makeIcon(dotSVG('#1565C0')) })
    .bindPopup(popupHTML('Inactive / Decommissioned','#1565C0',d));
  m.addTo(layers.inactive);
  return { ...d, marker: m };
});

function setReactivate(id, on) {
  const item = inactiveMarkers.find(m => m.id === id);
  if (!item) return;
  if (on) {
    reactivateSet.add(id);
    item.marker.setIcon(makeIcon(splitSVG(), 7));
  } else {
    reactivateSet.delete(id);
    item.marker.setIcon(makeIcon(dotSVG('#1565C0')));
  }
  syncProposedCount();
  renderList();
  savePins();
}

Object.values(layers).forEach(l => l.addTo(map));

function toggleLayer(name, on) {
  on ? layers[name].addTo(map) : map.removeLayer(layers[name]);
}

// ── Proposed pins ─────────────────────────────────────────────────────────────
const proposedPins = [];
let editingIdx = null;

function addProposed(lat, lng, name) {
  const m = L.marker([lat, lng], { icon: makeIcon(dotSVG('#E65100', 8)) })
    .bindPopup(`<span class="pop-badge" style="background:#E65100">Proposed Deployment</span>
      <div class="pop-title">${name}</div>
      <div class="pop-coords">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>`);
  m.addTo(layers.proposed);
  proposedPins.push({ name, lat, lon: lng, marker: m });
  syncProposedCount();
  renderList();
  savePins();
}

function syncProposedCount() {
  const n = proposedPins.length + reactivateSet.size;
  document.getElementById('s-new').textContent = n;
  document.getElementById('lct-new').textContent = n;
}

function removeProposed(i) {
  map.removeLayer(proposedPins[i].marker);
  proposedPins.splice(i, 1);
  syncProposedCount();
  renderList();
  savePins();
}

function renameProposed(i, newName) {
  proposedPins[i].name = newName;
  proposedPins[i].marker.setPopupContent(
    `<span class="pop-badge" style="background:#E65100">Proposed Deployment</span>
     <div class="pop-title">${newName}</div>
     <div class="pop-coords">${proposedPins[i].lat.toFixed(5)}, ${proposedPins[i].lon.toFixed(5)}</div>`
  );
  renderList();
  savePins();
}

// ── Add mode ──────────────────────────────────────────────────────────────────
let addMode = false;
function toggleAddMode() {
  addMode = !addMode;
  const btn = document.getElementById('addBtn');
  const hint = document.getElementById('addHint');
  btn.classList.toggle('active', addMode);
  btn.textContent = addMode ? '✕ Cancel' : '＋ Add Proposed Deployment';
  hint.classList.toggle('show', addMode);
  map.getContainer().style.cursor = addMode ? 'crosshair' : '';
}

map.on('click', function(e) {
  if (!addMode) return;
  const { lat, lng } = e.latlng;
  const name = prompt(`Name this site:\n(${lat.toFixed(5)}, ${lng.toFixed(5)})`, 'New Stream Site');
  if (name === null) { toggleAddMode(); return; }
  addProposed(lat, lng, name || 'Unnamed Site');
  toggleAddMode();
  setTab('proposed');
});

// ── Sidebar ───────────────────────────────────────────────────────────────────
let currentTab = 'active';

function setTab(t) {
  currentTab = t;
  ['active','inactive','proposed'].forEach(id =>
    document.getElementById('tab-'+id).classList.toggle('active', id === t));
  renderList();
}

function flyTo(lat, lon, zoom, marker) {
  map.flyTo([lat, lon], zoom, { duration: 0.8 });
  if (marker) setTimeout(() => marker.openPopup(), 850);
}

function renderList() {
  const list = document.getElementById('siteList');

  if (currentTab === 'active') {
    list.innerHTML = activeMarkers.map(d => `
      <div class="site-item" onclick="flyTo(${d.lat},${d.lon},14,activeMarkers.find(m=>m.id==='${d.id}').marker)">
        <div class="site-top">
          <div class="site-dot-wrap">${dotSVG('#2E7D32',5)}</div>
          <div class="site-info">
            <div class="site-name">${d.name}</div>
            <div class="site-id">${d.id}</div>
            <div class="site-loc">${d.loc}</div>
            <div class="site-coords">${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</div>
          </div>
        </div>
      </div>`).join('');

  } else if (currentTab === 'inactive') {
    list.innerHTML = inactiveMarkers.map(d => {
      const isR = reactivateSet.has(d.id);
      const dotHtml = isR ? splitSVG(5) : dotSVG('#1565C0',5);
      return `
      <div class="site-item">
        <div class="site-top" onclick="flyTo(${d.lat},${d.lon},14,inactiveMarkers.find(m=>m.id==='${d.id}').marker)" style="cursor:pointer">
          <div class="site-dot-wrap">${dotHtml}</div>
          <div class="site-info">
            <div class="site-name">${d.name}</div>
            <div class="site-id">${d.id}</div>
            <div class="site-loc">${d.loc}</div>
            <div class="site-coords">${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</div>
            <div class="site-last">Last active: ${d.last}</div>
          </div>
        </div>
        <div class="reactiv-row">
          <span class="reactiv-label ${isR?'on':''}">${isR ? 'Reactivate ✓' : 'Mark to reactivate'}</span>
          <label class="toggle-sw">
            <input type="checkbox" ${isR?'checked':''} onchange="setReactivate('${d.id}', this.checked)">
            <span class="toggle-sl"></span>
          </label>
        </div>
      </div>`}).join('');

  } else {
    const reactItems = inactiveMarkers.filter(m => reactivateSet.has(m.id));
    if (!proposedPins.length && !reactItems.length) {
      list.innerHTML = '<div class="empty-msg">No proposed deployments yet.<br><br>Switch to Satellite, find a stream, then use the button above to place a pin.<br><br>Or toggle "Reactivate" on any inactive gauge.</div>';
      return;
    }
    let html = '';
    if (reactItems.length) {
      html += `<div style="padding:6px 14px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:#1565C0;background:#E3F2FD;border-bottom:1px solid #eee">Reactivations (${reactItems.length})</div>`;
      html += reactItems.map(d => `
        <div class="site-item" onclick="flyTo(${d.lat},${d.lon},14,inactiveMarkers.find(m=>m.id==='${d.id}').marker)" style="background:#F8FBFF">
          <div class="site-top">
            <div class="site-dot-wrap">${splitSVG(5)}</div>
            <div class="site-info">
              <div class="site-name">${d.name}</div>
              <div class="site-id">${d.id}</div>
              <div class="site-loc">${d.loc}</div>
              <div class="site-coords">${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</div>
              <div class="site-last">Last active: ${d.last}</div>
            </div>
          </div>
        </div>`).join('');
    }
    if (proposedPins.length) {
      html += `<div style="padding:6px 14px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:#E65100;background:#FFF3E0;border-bottom:1px solid #eee">New Deployments (${proposedPins.length})</div>`;
    }
    if (proposedPins.length) {
      html += proposedPins.map((p, i) => {
      if (editingIdx === i) {
        return `
        <div class="site-item">
          <div class="site-top">
            <div class="site-dot-wrap">${dotSVG('#E65100',5)}</div>
            <div class="site-info">
              <input class="pin-edit-input" id="edit-input-${i}" value="${p.name}"
                onkeydown="if(event.key==='Enter'){saveEdit(${i})}" autofocus>
              <div class="site-coords">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</div>
            </div>
          </div>
          <div class="pin-actions">
            <button class="pin-edit-btn" onclick="saveEdit(${i})">✓ Save</button>
            <button class="pin-edit-btn" onclick="editingIdx=null;renderList()" style="color:#aaa">Cancel</button>
            <button class="pin-del-btn" onclick="removeProposed(${i})">✕ Remove</button>
          </div>
        </div>`;
      }
      return `
      <div class="site-item">
        <div class="site-top" onclick="flyTo(${p.lat},${p.lon},15,proposedPins[${i}].marker)" style="cursor:pointer">
          <div class="site-dot-wrap">${dotSVG('#E65100',5)}</div>
          <div class="site-info">
            <div class="site-name">${p.name}</div>
            <div class="site-coords">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</div>
          </div>
        </div>
        <div class="pin-actions">
          <button class="pin-edit-btn" onclick="event.stopPropagation();editingIdx=${i};renderList()">✎ Rename</button>
          <button class="pin-del-btn" onclick="event.stopPropagation();removeProposed(${i})">✕ Remove</button>
        </div>
      </div>`;
      }).join('');
    }
    list.innerHTML = html;
    if (editingIdx !== null) {
      setTimeout(() => {
        const el = document.getElementById(`edit-input-${editingIdx}`);
        if (el) { el.focus(); el.select(); }
      }, 50);
    }
  }
}

function saveEdit(i) {
  const el = document.getElementById(`edit-input-${i}`);
  if (el) renameProposed(i, el.value.trim() || proposedPins[i].name);
  editingIdx = null;
  renderList();
}

// ── Persistence ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'hohonu_oahu_pins';
let _saveReady = false;

function savePins() {
  if (!_saveReady) return;
  const data = {
    proposed: proposedPins.map(p => ({ name: p.name, lat: p.lat, lon: p.lon })),
    reactivate: [...reactivateSet]
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadSavedPins() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    (data.proposed || []).forEach(p => addProposed(p.lat, p.lon, p.name));
    (data.reactivate || []).forEach(id => {
      const cb = document.querySelector(`input[onchange*="'${id}'"]`);
      setReactivate(id, true);
    });
  } catch(e) {}
}


function exportJSON() {
  const data = {
    proposed: proposedPins.map(p => ({ name: p.name, lat: p.lat, lon: p.lon })),
    reactivate: [...reactivateSet]
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
  a.download = 'hohonu_oahu_deployment_pins.json';
  a.click();
}

function importJSON(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // Clear existing
      [...proposedPins].forEach((_, i) => map.removeLayer(proposedPins[i].marker));
      proposedPins.length = 0;
      reactivateSet.clear();
      inactiveMarkers.forEach(m => m.marker.setIcon(makeIcon(dotSVG('#1565C0'))));
      // Load new
      (data.proposed || []).forEach(p => {
        const m = L.marker([p.lat, p.lon], { icon: makeIcon(dotSVG('#E65100', 8)) })
          .bindPopup(`<span class="pop-badge" style="background:#E65100">Proposed Deployment</span>
            <div class="pop-title">${p.name}</div>
            <div class="pop-coords">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</div>`);
        m.addTo(layers.proposed);
        proposedPins.push({ name: p.name, lat: p.lat, lon: p.lon, marker: m });
      });
      (data.reactivate || []).forEach(id => setReactivate(id, true));
      syncProposedCount();
      savePins();
      renderList();
      document.getElementById('exportRow').classList.toggle('show', proposedPins.length > 0 || reactivateSet.size > 0);
    } catch(err) { alert('Could not load file — make sure it\'s a valid Hohonu pins JSON.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportCSV() {
  const rows = ['Name,Latitude,Longitude',
    ...proposedPins.map(p => `"${p.name}",${p.lat.toFixed(6)},${p.lon.toFixed(6)}`)];
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.join('\n')], {type:'text/csv'}));
  a.download = 'hohonu_proposed_deployments.csv';
  a.click();
}

renderList();
loadSavedPins();
_saveReady = true;
</script>
</body>
</html>
